<nav>
  <ul>
      {% for item in site.data.nav.itens %}
        <li><a href="/{{ item.url }}" alt="{{ item.title }}">{{ item.title }}</a></li>
      {% endfor %}
  </ul>

  <ul>
      {% for post in site.posts %}
        <li>
          <a href="/{{ post.url }}">{{ post.title }}</a>
        </li>
      {% endfor %}
    </ul>

</nav>
